name: docs-check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - "refactor/**"
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main

jobs:
  markdown-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check docs links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --base-url file://${{ github.workspace }}
            --root-dir .
            README.md
            wiki/*.md

name: tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUTF8: "1"

on:
  push:
    branches:
      - main
      - "refactor/**"
      - "feat/**"
      - "fix/**"

  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Install JS dependencies
        run: npm install esbuild

      - name: Run tests
        run: uv run pytest -q